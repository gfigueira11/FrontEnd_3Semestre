<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .corsim {
            color: green;
        }
        .cornao {
            color: red;
        }
    </style>
        
    </style>
</head>
<body>
    <input type="text" onblur="getElements(this.value)" placeholder="Digite o nome da classe">
    <button onclick="getElements();">Pegar elementos</button>
    <!-- ul>(li.corsim{Item $}+li.cornao{Item $})*2 -->
     <ul>
        <li class="corsim">Item 1</li>
        <li class="cornao">Item 2</li>
        <li class="corsim">Item 3</li>
        <li class="cornao">Item 4</li>
        <li class="corsim">Item 5</li>
        <li class="cornao">Item 6</li>
        <li class="corsim">Item 7</li>
        <li class="cornao">Item 8</li>
        <li class="corsim">Item 9</li>
        <li class="cornao">Item 10</li>
     </ul>

     <script>
        function getElements(nomeClasse = "cornao") {
            let elementos = document.getElementsByClassName(nomeClasse);

            console.log(elementos);
            //console.log(elementos[0].textContent);

            if(elementos.length === 0){
                alert("Nenhum existe elementos para msotrar");
                return false;
            }

            for(let i = 0; i < elementos.length; i++){
                console.log(elementos[i].textContent);
            }
        }
     </script>
</body>
</html>
